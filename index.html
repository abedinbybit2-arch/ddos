<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Monitor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    padding: 24px;
    min-height: 100vh;
  }
  h2 {
    font-size: 1rem;
    color: #888;
    letter-spacing: 2px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }
  .stats {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 12px 20px;
    min-width: 140px;
  }
  .stat .l { font-size: .7rem; color: #555; margin-bottom: 4px; }
  .stat .v { font-size: 1.6rem; font-weight: bold; }
  .v.red { color: #ff3c3c; }
  .v.green { color: #00e676; }
  .v.white { color: #fff; }

  #log {
    background: #111;
    border: 1px solid #222;
    border-radius: 6px;
    height: 420px;
    overflow-y: auto;
    padding: 8px 0;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
  }
  .entry {
    padding: 6px 14px;
    font-size: .78rem;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    gap: 12px;
    animation: fadein .2s;
  }
  @keyframes fadein { from { opacity:0 } to { opacity:1 } }
  .entry .t  { color: #444; min-width: 80px; }
  .entry .ip { color: #f0c040; min-width: 130px; }
  .entry .p  { color: #ccc; flex: 1; }
  .entry .tag { font-size: .68rem; font-weight: bold; padding: 1px 6px; border-radius: 3px; }
  .tag.ok  { background: #0a2a0a; color: #00e676; }
  .tag.atk { background: #2a0a0a; color: #ff3c3c; }

  #tg-status {
    margin-top: 14px;
    font-size: .75rem;
    color: #444;
  }
  #tg-status span { color: #888; }
</style>
</head>
<body>

<h2>⬛ Request Monitor</h2>

<div class="stats">
  <div class="stat"><div class="l">TOTAL</div><div class="v white" id="s-total">0</div></div>
  <div class="stat"><div class="l">REQ / SEC</div><div class="v" id="s-rps">0</div></div>
  <div class="stat"><div class="l">UNIQUE IPs</div><div class="v white" id="s-ips">0</div></div>
  <div class="stat"><div class="l">STATUS</div><div class="v green" id="s-status">SAFE</div></div>
</div>

<div id="log"></div>
<div id="tg-status">Telegram: <span id="tg-txt">waiting...</span></div>

<script>
// ── CONFIG (এখানে তোমার Bot Token ও Chat ID দাও) ──
const BOT_TOKEN = "8726361470:AAErTzupAMjDRDopACMXBz0_YMuU_2h2cQg";
const CHAT_ID   = "1873240895";
const DDOS_THRESHOLD = 10; // per second এই সংখ্যার বেশি হলে DDoS ধরবে

// ─────────────────────────────────────────────────
let total = 0;
let ipMap = {};
let bucket = []; // current-second timestamps
let prevRPS = 0;
let isAttack = false;

// প্রতি সেকেন্ডে RPS হিসাব করে Telegram এ পাঠায়
setInterval(() => {
  const now = Date.now();
  bucket = bucket.filter(t => now - t < 1000);
  const rps = bucket.length;

  // UI update
  const rpsEl = document.getElementById('s-rps');
  rpsEl.textContent = rps;
  rpsEl.className = 'v ' + (rps >= DDOS_THRESHOLD ? 'red' : 'green');

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-ips').textContent = Object.keys(ipMap).length;

  const stEl = document.getElementById('s-status');
  if (rps >= DDOS_THRESHOLD) {
    stEl.textContent = 'ATTACK!'; stEl.className = 'v red';
  } else {
    stEl.textContent = 'SAFE'; stEl.className = 'v green';
  }

  const nowAttack = rps >= DDOS_THRESHOLD;

  // Request না আসলে Telegram এ কিছু পাঠাবে না
  if (rps === 0) {
    isAttack = false;
    return;
  }

  // Attack শুরু বা শেষ হলে alert
  if (nowAttack && !isAttack) {
    tg(`🚨 *DDOS ATTACK শুরু!*\nReq/sec: *${rps}*\nTotal: ${total}\n🕐 ${ts()}`);
  } else if (!nowAttack && isAttack) {
    tg(`✅ *Attack শেষ। Traffic স্বাভাবিক।*\nReq/sec: ${rps}\n🕐 ${ts()}`);
  } else if (nowAttack) {
    // প্রতি সেকেন্ডে DDoS summary
    const topIPs = Object.entries(ipMap).sort((a,b)=>b[1]-a[1]).slice(0,5)
      .map(([ip,c])=>`  • \`${ip}\` — ${c}`).join('\n');
    tg(`⚠️ *DDoS চলছে*\nReq/sec: *${rps}* | Total: ${total}\nUnique IPs: ${Object.keys(ipMap).length}\n\n*Top IPs:*\n${topIPs}\n🕐 ${ts()}`);
  } else {
    // Normal request এলে প্রতি সেকেন্ডে summary
    tg(`📶 *Normal Traffic*\nReq/sec: ${rps} | Total: ${total}\nUnique IPs: ${Object.keys(ipMap).length}\n🕐 ${ts()}`);
  }

  isAttack = nowAttack;
  prevRPS = rps;
}, 1000);

// ── Request লগ করার function (তোমার backend এটা call করবে) ──
function trackRequest(ip, path, method) {
  if (!ip) return; // IP না থাকলে কিছু করবে না
  path   = path   || '/';
  method = method || 'GET';

  total++;
  bucket.push(Date.now());
  ipMap[ip] = (ipMap[ip] || 0) + 1;

  const rps = bucket.filter(t => Date.now() - t < 1000).length;
  const atk = rps >= DDOS_THRESHOLD;

  const log = document.getElementById('log');
  if (log.children.length === 0 || log.children[0].classList.contains('empty')) {
    log.innerHTML = '';
  }

  const el = document.createElement('div');
  el.className = 'entry';
  el.innerHTML = `
    <span class="t">${ts()}</span>
    <span class="ip">${ip}</span>
    <span class="p">${method} ${path}</span>
    <span class="tag ${atk ? 'atk' : 'ok'}">${atk ? 'ATTACK' : 'OK'}</span>
  `;
  log.prepend(el);
  while (log.children.length > 300) log.removeChild(log.lastChild);
}

// ── Telegram sender ──
async function tg(text) {
  document.getElementById('tg-txt').textContent = text.replace(/\*/g,'').split('\n')[0];
  try {
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: CHAT_ID, text, parse_mode: 'Markdown' })
    });
  } catch(e) {
    document.getElementById('tg-txt').textContent = 'Error: ' + e.message;
  }
}

function ts() {
  return new Date().toLocaleTimeString('en-GB');
}

// ── তোমার backend থেকে এভাবে call করো ──
// trackRequest("192.168.1.1", "/api/data", "GET");
</script>

</body>
</html>
